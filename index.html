<!DOCTYPE html>
<html>
    <head>
        <title>Todo list</title>
        <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="css/custom.css">
    </head>
    <body>
        <nav class="navbar navbar-default">
            <div class="container-fluid">
                <div class="navbar-header">
                    <span class="navbar-brand">TODO LIST</span>
                </div>
            </div>
        </nav>

        <div class="container">
            <h2>Your Task
                <span id="YourTaskBadge" class="badge">0</span>
            </h2>
            <div>
                <div class="form-group">
                    <label for="inputTask">Task to do</label>
                    <input type="text" class="form-control" id="inputTask" placeholder="Enter a task">
                </div>

                <button type="button" id="addTask" class="btn btn-default">Add</button>
                <button type="button" id="markAllAsDone" class="btn btn-success">Mark all as done</button>
                <button type="button" id="removeAll" class="btn btn-danger">Remove all</button>
            </div>
            <br/>
            <ul class="list-group" id="taskList"></ul>
        </div>
    </body>
</html>
